# ==============================================================================
# 测试配置 48 - kubeadm + Flannel CNI
# ==============================================================================
# 说明：使用 Flannel 作为网络插件
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-48-kubeadm-flannel
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: flannel
    interface: "eth.*"
    ip_family: ipv4
    node_cidr_mask_size: 24
    flannel:
      version: v0.24.0
      backend: vxlan

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kh
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      haproxy:
        stats_port: 9000
        stats_user: admin
        stats_password: admin

  logging:
    level: info
