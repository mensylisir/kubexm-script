# ==============================================================================
# 测试配置 19 - kubeadm 三节点 + kube-vip
# ==============================================================================
# 说明：使用 Kube-VIP 作为负载均衡器（在所有 master 节点部署 keepalived）
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-19-kubeadm-3master-kubevip
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: kube-vip
    vip: 192.168.1.100
    interface: eth0

    kube_vip:
      mode: arp

  logging:
    level: info
