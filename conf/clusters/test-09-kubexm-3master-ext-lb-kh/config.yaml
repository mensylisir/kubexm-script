# ==============================================================================
# 测试配置 09 - kubexm 三节点 + external LB (kubexm-kh)
# ==============================================================================
# 说明：kubernetes和etcd都使用二进制，使用Keepalived+HAProxy作为外部负载均衡器
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-09-kubexm-3master-ext-lb-kh
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubexm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubexm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kh
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      haproxy:
        stats_port: 9000
        stats_user: admin
        stats_password: admin

  logging:
    level: info
