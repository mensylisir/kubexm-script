# ==============================================================================
# 测试配置 28 - kubeadm 所有插件启用
# ==============================================================================
# 说明：启用所有可用插件进行测试
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-28-kubeadm-all-addons
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kh
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      haproxy:
        stats_port: 9000
        stats_user: admin
        stats_password: admin

  addons:
    metrics_server:
      enabled: true

    dashboard:
      enabled: true
      version: v2.7.0

    nodelocaldns:
      enabled: true

    storage:
      local_path_provisioner:
        enabled: true
        version: v0.0.26

    ingress_controller:
      enabled: true
      type: nginx
      version: v1.9.4
      host_network: true

  certificates:
    auto_renew:
      enabled: true

  backup:
    etcd:
      enabled: true
      schedule: "0 2 * * *"
      retention_days: 7

  logging:
    level: info
