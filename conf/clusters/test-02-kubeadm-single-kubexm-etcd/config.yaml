# ==============================================================================
# 测试配置 02 - kubeadm 单节点 + kubexm etcd
# ==============================================================================
# 说明：kubernetes使用kubeadm部署，etcd使用二进制部署
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-02-kubeadm-single-kubexm-etcd
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubexm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  logging:
    level: info
