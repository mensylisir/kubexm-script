# ==============================================================================
# 测试配置 34 - kubexm + Podman 运行时
# ==============================================================================
# 说明：使用 Podman 作为容器运行时
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-34-kubexm-podman
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubexm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubexm
    data_dir: /var/lib/etcd

  runtime:
    type: podman
    version: v5.0.0
    cgroup_driver: systemd
    storage_driver: "overlay"
    rootless: false
    events_logger: "file"

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kh
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      haproxy:
        stats_port: 9000
        stats_user: admin
        stats_password: admin

  logging:
    level: info
