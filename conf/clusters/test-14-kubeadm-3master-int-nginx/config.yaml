# ==============================================================================
# 测试配置 14 - kubeadm 三节点 + internal LB (Nginx)
# ==============================================================================
# 说明：使用 Nginx 作为内部负载均衡器（静态Pod方式部署）
# kubeadm 使用静态 Pod 部署 internal LB
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-14-kubeadm-3master-int-nginx
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: internal
    type: nginx

    internal:
      nginx:
        bind_port: 6443

  logging:
    level: info
