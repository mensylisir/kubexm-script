# ==============================================================================
# 测试配置 24 - kubeadm 三节点 + existing LB
# ==============================================================================
# 说明：使用现有的硬件负载均衡器，不部署 LB 软件
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-24-kubeadm-3master-exist-lb
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: exists

  logging:
    level: info
