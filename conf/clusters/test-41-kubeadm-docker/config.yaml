# ==============================================================================
# 测试配置 41 - kubeadm + Docker 运行时
# ==============================================================================
# 说明：使用 Docker + cri-dockerd 作为容器运行时
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-41-kubeadm-docker
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: docker
    version: v1.7.13
    cgroup_driver: systemd
    cri_dockerd:
      enabled: true
      version: v0.3.10
    daemon_json:
      live_restore: true
      log_driver: "json-file"
      log_opts:
        max-size: "100m"
        max-file: "5"
      storage_driver: "overlay2"

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kh
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      haproxy:
        stats_port: 9000
        stats_user: admin
        stats_password: admin

  logging:
    level: info
