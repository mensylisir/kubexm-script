# ==============================================================================
# 测试配置 46 - kubexm + Containerd + Kube-VIP
# ==============================================================================
# 说明：使用 Containerd 运行时，Kube-VIP 负载均衡
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-46-kubexm-containerd-kubevip
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubexm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubexm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: kube-vip
    vip: 192.168.1.100
    interface: eth0

    kube_vip:
      mode: arp

  logging:
    level: info
