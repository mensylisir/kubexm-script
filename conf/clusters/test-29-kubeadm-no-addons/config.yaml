# ==============================================================================
# 测试配置 29 - kubeadm 不启用任何插件
# ==============================================================================
# 说明：不启用任何附加插件，仅部署基础集群
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-29-kubeadm-no-addons
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubeadm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kh
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      haproxy:
        stats_port: 9000
        stats_user: admin
        stats_password: admin

  addons:
    metrics_server:
      enabled: false

    dashboard:
      enabled: false

    nodelocaldns:
      enabled: false

    storage:
      local_path_provisioner:
        enabled: false

    ingress_controller:
      enabled: false

  logging:
    level: info
