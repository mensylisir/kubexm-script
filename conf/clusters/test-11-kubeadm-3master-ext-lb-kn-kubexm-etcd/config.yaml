# ==============================================================================
# 测试配置 11 - kubeadm 三节点 + kubexm etcd + external LB (kubexm-kn)
# ==============================================================================
# 说明：kubernetes使用kubeadm，etcd使用二进制，使用Keepalived+Nginx作为外部负载均衡器
# ==============================================================================

apiVersion: kubexm.io/v1
kind: Config
metadata:
  name: test-11-kubeadm-3master-ext-lb-kn-kubexm-etcd
spec:
  mode: offline
  arch:
    - amd64
  kubernetes:
    type: kubeadm
    version: v1.32.4
    service_cidr: 10.96.0.0/12
    pod_cidr: 10.244.0.0/16
    cluster_domain: cluster.local

  etcd:
    type: kubexm
    data_dir: /var/lib/etcd

  runtime:
    type: containerd
    version: v1.7.13
    cgroup_driver: systemd

  network:
    plugin: calico
    interface: "eth.*"

  loadbalancer:
    enabled: true
    mode: external
    type: kubexm-kn
    vip: 192.168.1.100
    interface: eth0

    external:
      keepalived:
        router_id: 51
        priority: 100
        auth_pass: "kubexm_pass"
      nginx:
        stream_port: 6443

  logging:
    level: info
